<style>
  /* SharedStyles.html -- Common CSS for all sidebars and dialogs */
  * { box-sizing: border-box; }
  body {
    font-family: 'Arial', 'Helvetica', sans-serif;
    direction: rtl;
    margin: 0;
    padding: 12px;
    font-size: 13px;
    color: #333;
  }
  h3 {
    margin: 0 0 12px 0;
    font-size: 15px;
    color: #1a73e8;
    border-bottom: 2px solid #1a73e8;
    padding-bottom: 6px;
  }
  .btn {
    display: inline-block;
    padding: 8px 16px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    transition: background-color 0.2s;
  }
  .btn-primary {
    background-color: #1a73e8;
    color: white;
  }
  .btn-primary:hover { background-color: #1557b0; }
  .btn-secondary {
    background-color: #f1f3f4;
    color: #333;
  }
  .btn-secondary:hover { background-color: #e0e0e0; }
  .btn-danger {
    background-color: #d93025;
    color: white;
    padding: 4px 8px;
    font-size: 11px;
  }
  .btn-danger:hover { background-color: #b3261e; }
  .btn-small {
    padding: 4px 8px;
    font-size: 11px;
  }
  .form-group {
    margin-bottom: 10px;
  }
  .form-group label {
    display: block;
    margin-bottom: 4px;
    font-weight: bold;
    font-size: 12px;
  }
  .form-group input,
  .form-group textarea,
  .form-group select {
    width: 100%;
    padding: 8px;
    border: 1px solid #ddd;
    border-radius: 4px;
    font-family: inherit;
    font-size: 13px;
    direction: rtl;
  }
  .form-group input:focus,
  .form-group textarea:focus,
  .form-group select:focus {
    border-color: #1a73e8;
    outline: none;
    box-shadow: 0 0 0 2px rgba(26,115,232,0.15);
  }
  .divider {
    border-top: 1px solid #e0e0e0;
    margin: 12px 0;
  }
  .status {
    padding: 8px;
    border-radius: 4px;
    margin-bottom: 8px;
    font-size: 12px;
    display: none;
  }
  .status.success { display: block; background: #e6f4ea; color: #137333; }
  .status.error { display: block; background: #fce8e6; color: #c5221f; }
</style>
