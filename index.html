<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מצגת טיעונים</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div class="index-bg">
        <div class="container">
            <header class="index-header">
                <h1><i class="fas fa-balance-scale" style="color: var(--accent); margin-left: 12px;"></i>מצגת טיעונים</h1>
                <p>בחר תיק לצפייה במסמכי הטיעון</p>
                <div class="accent-line"></div>
            </header>

            <div id="cases-container" class="row g-4 pb-5">
                <!-- Cases loaded dynamically -->
            </div>

            <div id="loading" class="text-center py-5">
                <div class="spinner-border text-info" role="status" style="color: var(--accent) !important;">
                    <span class="visually-hidden">טוען...</span>
                </div>
            </div>

            <div id="error" class="text-center py-5" style="display: none;">
                <i class="fas fa-exclamation-triangle fa-3x mb-3" style="color: var(--text-muted);"></i>
                <p style="color: var(--text-muted);">לא נמצאו תיקים. ודא שקובץ <code>data/cases.json</code> קיים.</p>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
