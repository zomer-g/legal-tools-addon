<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מצגת טיעונים</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <!-- Reading Progress Bar -->
    <div class="reading-progress" id="readingProgress"></div>

    <!-- Navbar -->
    <nav class="viewer-navbar">
        <a href="index.html" class="back-btn">
            <i class="fas fa-arrow-right"></i>
            <span>חזרה</span>
        </a>
        <div class="doc-title" id="docTitle">טוען מסמך...</div>
        <div class="nav-actions">
            <button class="sidebar-toggle" id="sidebarToggle" title="תוכן עניינים">
                <i class="fas fa-list"></i>
            </button>
            <button id="adminToggle" title="מצב עריכה (אדמין)">
                <i class="fas fa-pen"></i>
            </button>
            <button id="themeToggle" title="החלף ערכת נושא">
                <i class="fas fa-sun"></i>
            </button>
            <button id="printBtn" title="הדפסה">
                <i class="fas fa-print"></i>
            </button>
        </div>
    </nav>

    <!-- Sidebar Overlay (mobile) -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Main Layout -->
    <div class="viewer-layout">
        <!-- Content Area -->
        <main class="viewer-content" id="contentArea">
            <div id="chapterContent"></div>

            <!-- Chapter Navigation -->
            <div class="chapter-nav" id="chapterNav">
                <button class="chapter-nav-btn" id="nextChapterBtn">
                    <i class="fas fa-arrow-right"></i>
                    <div>
                        <span class="nav-label">הפרק הבא</span>
                        <span class="nav-title" id="nextChapterTitle"></span>
                    </div>
                </button>
                <button class="chapter-nav-btn" id="prevChapterBtn">
                    <div>
                        <span class="nav-label">הפרק הקודם</span>
                        <span class="nav-title" id="prevChapterTitle"></span>
                    </div>
                    <i class="fas fa-arrow-left"></i>
                </button>
            </div>
        </main>

        <!-- Sidebar with Tabs -->
        <aside class="viewer-sidebar" id="sidebar">
            <!-- Tab Buttons -->
            <div class="sidebar-tabs">
                <button class="sidebar-tab active" data-tab="tocPanel">
                    <i class="fas fa-bookmark"></i> תוכן עניינים
                </button>
                <button class="sidebar-tab" data-tab="entitiesPanel">
                    <i class="fas fa-tags"></i> ישויות
                </button>
            </div>

            <!-- TOC Panel -->
            <div class="sidebar-panel active" id="tocPanel">
                <ul class="toc-list" id="tocList"></ul>
            </div>

            <!-- Entities Panel -->
            <div class="sidebar-panel" id="entitiesPanel">
                <!-- Populated by JS -->
            </div>
        </aside>
    </div>

    <!-- PDF Modal -->
    <div class="pdf-modal-overlay" id="pdfModal">
        <div class="pdf-modal">
            <div class="pdf-modal-header">
                <h4 id="pdfModalTitle">מסמך</h4>
                <button class="close-btn" id="pdfModalClose">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="pdf-modal-body" id="pdfModalBody">
                <div class="pdf-placeholder">
                    <i class="fas fa-file-pdf"></i>
                    <p>המסמך אינו זמין כעת</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Print Dialog -->
    <div class="pdf-modal-overlay" id="printDialog">
        <div class="print-dialog">
            <div class="print-dialog-header">
                <h4><i class="fas fa-print" style="margin-left: 8px;"></i>הדפסה</h4>
                <button class="close-btn" onclick="ViewerApp.closePrintDialog()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="print-dialog-body">
                <div class="print-select-actions">
                    <button class="print-select-btn" onclick="ViewerApp.printSelectAll(true)">בחר הכל</button>
                    <button class="print-select-btn" onclick="ViewerApp.printSelectAll(false)">נקה הכל</button>
                </div>
                <div class="print-chapter-list" id="printChapterList">
                    <!-- Populated by JS -->
                </div>
            </div>
            <div class="print-dialog-footer">
                <button class="print-action-btn" onclick="ViewerApp.printSelected()">
                    <i class="fas fa-print"></i> הדפס פרקים נבחרים
                </button>
            </div>
        </div>
    </div>

    <!-- Keyboard Shortcuts Hint -->
    <div class="kbd-hint" id="kbdHint">
        <kbd>&rarr;</kbd> פרק קודם &nbsp; <kbd>&larr;</kbd> פרק הבא &nbsp; <kbd>Esc</kbd> סגור
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="js/entities.js"></script>
    <script src="js/viewer.js"></script>
</body>
</html>
